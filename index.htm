<div class="row g-3 text-center" id="menu-grid">
    </div>

<div id="lapor-tugas-page" class="container mt-4 mb-5 hidden">
    <div class="d-flex align-items-center mb-4">
        <button onclick="bukaHalaman('dashboard-page')" class="btn btn-light shadow-sm me-3"><i class="bi bi-arrow-left"></i></button>
        <h4 class="fw-bold m-0">Lapor Kegiatan</h4>
    </div>
    <div class="card border-0 shadow-sm p-4" style="border-radius: 15px;">
        <form id="formTugas">
            <div class="mb-3">
                <label class="form-label small fw-bold">Pilih Wilayah (Desa Binaan)</label>
                <select id="tugas-desa" class="form-select" required>
                    <option value="">Memuat desa...</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label small fw-bold">Topik Kegiatan</label>
                <select id="tugas-topik" class="form-select" required>
                    <option value="POSYANDU">POSYANDU</option>
                    <option value="KIE INDIVIDU">KIE INDIVIDU</option>
                    <option value="MINILOKAKARYA">MINILOKAKARYA</option>
                    <option value="POK_KB">KELOMPOK KB</option>
                    <option value="ADMINISTRASI">ADMINISTRASI</option>
                    <option value="LAINNYA">LAINNYA</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label small fw-bold">Judul / Keterangan Laporan</label>
                <textarea id="tugas-judul" class="form-control" rows="3" placeholder="Contoh: Pendampingan ibu hamil di banjar dinas..."></textarea>
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold">Lampiran File (Foto/PDF/Dokumen)</label>
                <input type="file" id="tugas-file" class="form-control" accept="image/*,.pdf,.doc,.docx,.xls,.xlsx">
                <small class="text-muted" style="font-size: 0.7rem;">Maksimal 20MB</small>
            </div>
            <button type="button" onclick="kirimLaporan()" id="btnKirimTugas" class="btn btn-primary w-100 py-3 fw-bold rounded-4 shadow">KIRIM LAPORAN</button>
        </form>
    </div>
</div>

<script>
// ... (Tambahkan fungsi-fungsi ini di dalam tag <script>)

function renderMenu(role) {
    const grid = document.getElementById('menu-grid');
    let menus = [
        ['bi-person-lines-fill', '#198754', 'Detail Profil', 'bukaHalaman("detail-profil-page")'],
        ['bi-megaphone-fill', '#0dcaf0', 'Informasi', 'alert("Menu Info")']
    ];
    
    // Semua PKB bisa lapor tugas
    if(role === "PKB" || role === "User/PKB") {
        menus.unshift(['bi-journal-check', '#0d6efd', 'Lapor Tugas', 'siapkanLaporTugas()']);
        menus.push(['bi-file-earmark-text', '#6f42c1', 'Administrasi', 'alert("Menu Admin")']);
    }
    
    grid.innerHTML = menus.map(m => `
        <div class="col-6 mb-2">
            <div class="card p-3 border-0 shadow-sm menu-card h-100" onclick='${m[3]}'>
                <i class="bi ${m[0]} h2 mb-2" style="color:${m[1]}"></i>
                <div class="small fw-bold">${m[2]}</div>
            </div>
        </div>
    `).join('');
}

async function siapkanLaporTugas() {
    const user = JSON.parse(localStorage.getItem('userPKB'));
    bukaHalaman('lapor-tugas-page');
    
    // Ambil daftar desa binaan khusus user ini
    const sel = document.getElementById('tugas-desa');
    sel.innerHTML = '<option value="">Memuat desa...</option>';
    
    try {
        const res = await fetch(`${SCRIPT_URL}?action=get_binaan&nip=${user.nip}`);
        const d = await res.json();
        if(d.status === "sukses") {
            let html = '<option value="">-- Pilih Desa --</option>';
            d.binaan.forEach(b => {
                html += `<option value="${b.id}" data-nama="${b.nama}">${b.nama} (${b.kec})</option>`;
            });
            sel.innerHTML = html;
        }
    } catch(e) { alert("Gagal memuat daftar desa binaan."); }
}

async function kirimLaporan() {
    const user = JSON.parse(localStorage.getItem('userPKB'));
    const btn = document.getElementById('btnKirimTugas');
    const fileInput = document.getElementById('tugas-file');
    const desaSel = document.getElementById('tugas-desa');
    
    if(!desaSel.value || !fileInput.files[0]) return alert("Harap pilih Desa dan sertakan Lampiran File!");

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Mengirim...';

    const file = fileInput.files[0];
    const reader = new FileReader();
    
    reader.onload = async function(e) {
        const base64Data = e.target.result.split(',')[1];
        const p = new URLSearchParams();
        p.append('action', 'lapor_tugas');
        p.append('nip', user.nip);
        p.append('nama_pkb', user.nama_asli);
        p.append('id_desa', desaSel.value);
        p.append('nama_desa', desaSel.options[desaSel.selectedIndex].getAttribute('data-nama'));
        p.append('topik', document.getElementById('tugas-topik').value);
        p.append('judul', document.getElementById('tugas-judul').value);
        p.append('filename', file.name);
        p.append('mimeType', file.type);
        p.append('fileData', base64Data);

        try {
            const res = await fetch(SCRIPT_URL, { method: 'POST', body: p });
            const d = await res.json();
            if(d.status === "sukses") {
                alert("Laporan berhasil terkirim dan tersimpan di Shared Drive!");
                document.getElementById('formTugas').reset();
                bukaHalaman('dashboard-page');
            } else {
                alert("Gagal: " + d.pesan);
            }
        } catch(err) { alert("Terjadi kesalahan koneksi."); }
        finally { btn.disabled = false; btn.innerText = "KIRIM LAPORAN"; }
    };
    reader.readAsDataURL(file);
}
</script>
