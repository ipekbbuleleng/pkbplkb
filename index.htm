<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Informasi Pegawai</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --primary-color: #0056b3; }
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* Splash Screen */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
        }

        .hidden { display: none !important; }
        
        /* Card Styles */
        .card-profile { border-radius: 15px; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .profile-img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid white; }
        .header-bg { background: var(--primary-color); height: 80px; border-radius: 15px 15px 0 0; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="spinner-border text-primary" role="status"></div>
        <h5 class="mt-3 text-secondary text-center">Aplikasi Pegawai<br><small>Menyiapkan Data...</small></h5>
    </div>

    <div id="login-page" class="container mt-5 hidden">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="text-center mb-4">
                    <i class="bi bi-person-badge text-primary" style="font-size: 4rem;"></i>
                    <h2 class="fw-bold">Login Pegawai</h2>
                </div>
                <div class="card p-4 shadow-sm border-0">
                    <div class="mb-3">
                        <label class="form-label">NIP</label>
                        <input type="text" id="nip" class="form-control" placeholder="Masukkan NIP">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password (NIK)</label>
                        <input type="password" id="nik" class="form-control" placeholder="Masukkan NIK">
                    </div>
                    <button onclick="prosesLogin()" id="btnLogin" class="btn btn-primary w-100 py-2">MASUK</button>
                    <div id="loginError" class="text-danger mt-2 small text-center hidden">NIP atau NIK salah!</div>
                </div>
            </div>
        </div>
    </div>

    <div id="dashboard-page" class="container mt-4 hidden">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold m-0">Dashboard</h4>
            <button onclick="logout()" class="btn btn-sm btn-outline-danger">Logout</button>
        </div>

        <div class="card card-profile mb-4">
            <div class="header-bg"></div>
            <div class="px-4 text-center" style="margin-top: -50px;">
                <img id="view-foto" src="https://via.placeholder.com/150" class="profile-img shadow">
                <h4 id="view-nama" class="mt-2 mb-0 fw-bold">-</h4>
                <p id="view-jabatan" class="text-muted small">-</p>
            </div>
            <div class="card-body pt-0">
                <ul class="list-group list-group-flush">
                    <li class="list-group-item d-flex justify-content-between align-items-center px-0">
                        <span class="text-secondary small">NIP</span>
                        <span id="view-nip" class="fw-medium small">-</span>
                    </li>
                    <li class="list-group-item d-flex justify-content-between align-items-center px-0">
                        <span class="text-secondary small">Unit Kerja</span>
                        <span id="view-unit" class="fw-medium small">-</span>
                    </li>
                    <li class="list-group-item d-flex justify-content-between align-items-center px-0">
                        <span class="text-secondary small">Alamat</span>
                        <span id="view-alamat" class="fw-medium small text-end" style="width: 60%;">-</span>
                    </li>
                </ul>
            </div>
        </div>

        <div class="row g-3 text-center">
            <div class="col-4">
                <div class="card p-3 border-0 shadow-sm opacity-50">
                    <i class="bi bi-megaphone-fill text-primary h3"></i>
                    <div class="small">Info</div>
                </div>
            </div>
            <div class="col-4">
                <div class="card p-3 border-0 shadow-sm opacity-50">
                    <i class="bi bi-briefcase-fill text-primary h3"></i>
                    <div class="small">Tugas</div>
                </div>
            </div>
            <div class="col-4">
                <div class="card p-3 border-0 shadow-sm opacity-50">
                    <i class="bi bi-file-earmark-text-fill text-primary h3"></i>
                    <div class="small">Admin</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // GANTI INI dengan URL Web App dari Google Apps Script Anda
        const SCRIPT_URL = "URL_GOOGLE_APPS_SCRIPT_ANDA_DISINI";

        window.onload = () => {
            // Simulasi Splash Screen selama 2 detik
            setTimeout(() => {
                document.getElementById('splash-screen').classList.add('hidden');
                
                // Cek apakah sudah pernah login (Simpan di LocalStorage)
                const user = localStorage.getItem('userPegawai');
                if (user) {
                    tampilkanProfil(JSON.parse(user));
                } else {
                    document.getElementById('login-page').classList.remove('hidden');
                }
            }, 2000);
        };

        async function prosesLogin() {
            const nip = document.getElementById('nip').value;
            const nik = document.getElementById('nik').value;
            const btn = document.getElementById('btnLogin');
            const errorMsg = document.getElementById('loginError');

            if (!nip || !nik) return alert("Isi NIP dan NIK!");

            btn.disabled = true;
            btn.innerText = "Mengecek...";
            errorMsg.classList.add('hidden');

            try {
                // Mengirim data ke Google Apps Script (Metode POST)
                const response = await fetch(`${SCRIPT_URL}?nip=${nip}&nik=${nik}`, { method: 'POST' });
                const result = await response.json();

                if (result.status === "sukses") {
                    localStorage.setItem('userPegawai', JSON.stringify(result.dataProfil));
                    tampilkanProfil(result.dataProfil);
                } else {
                    errorMsg.classList.remove('hidden');
                }
            } catch (error) {
                console.error(error);
                alert("Gagal terhubung ke server!");
            } finally {
                btn.disabled = false;
                btn.innerText = "MASUK";
            }
        }

        function tampilkanProfil(data) {
            document.getElementById('login-page').classList.add('hidden');
            document.getElementById('dashboard-page').classList.remove('hidden');

            document.getElementById('view-nama').innerText = data.nama;
            document.getElementById('view-jabatan').innerText = data.jabatan;
            document.getElementById('view-nip').innerText = data.nip;
            document.getElementById('view-unit').innerText = data.unit_kerja;
            document.getElementById('view-alamat').innerText = data.alamat;
            if (data.foto) document.getElementById('view-foto').src = data.foto;
        }

        function logout() {
            localStorage.removeItem('userPegawai');
            location.reload();
        }
    </script>
</body>
</html>
