<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-PKB Buleleng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --primary-color: #007bff; } body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .hidden { display: none !important; } .card-profile { border-radius: 15px; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.08); overflow: hidden; }
        .profile-img { width: 110px; height: 110px; border-radius: 50%; object-fit: cover; border: 4px solid white; background: white; }
        .header-bg { background: linear-gradient(135deg, var(--primary-color), #0056b3); height: 100px; }
        .menu-card { transition: transform 0.2s; cursor: pointer; border-radius: 12px; height: 100%; }
        .form-section-title { font-size: 0.9rem; font-weight: bold; color: var(--primary-color); margin-bottom: 10px; padding-bottom: 5px; border-bottom: 2px solid #e9ecef; margin-top: 25px; }
        .info-row { border-bottom: 1px dashed #dee2e6; padding: 10px 0; font-size:0.9rem; }
    </style>
</head>
<body>

    <div id="splash-screen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:white; display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:9999;">
        <img src="IPeKB26-PWA.png" style="width:150px;">
        <div class="spinner-border text-primary mt-3"></div>
    </div>

    <div id="login-page" class="container mt-5 hidden">
        <div class="card p-4 shadow border-0 mx-auto" style="max-width: 400px; border-radius: 15px;">
            <h4 class="text-center fw-bold">Login PKB</h4>
            <div class="mt-4"><label class="small fw-bold">NIP</label><input type="text" id="nip" class="form-control"></div>
            <div class="mt-3"><label class="small fw-bold">NIK (Password)</label><input type="password" id="nik" class="form-control"></div>
            <button onclick="prosesLogin()" id="btnLogin" class="btn btn-primary w-100 mt-4 py-2 fw-bold">MASUK</button>
        </div>
    </div>

    <div id="dashboard-page" class="container mt-4 mb-5 hidden">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="fw-bold m-0">Beranda</h4>
            <button onclick="logout()" class="btn btn-sm btn-outline-danger">Keluar</button>
        </div>
        <div class="card card-profile mb-4">
            <div class="header-bg"></div>
            <div class="text-center" style="margin-top: -55px;">
                <img id="view-foto" src="https://via.placeholder.com/150" class="profile-img shadow-sm">
                <h5 id="view-nama" class="mt-2 fw-bold text-dark">-</h5>
                <span id="view-role" class="badge bg-warning text-dark px-3 mb-2">-</span>
            </div>
            <div class="card-body bg-light text-center small">
                <div class="fw-bold" id="view-nip">-</div>
                <div id="view-kec" class="text-muted mt-1">-</div>
            </div>
        </div>
        <div class="row g-3" id="menu-grid"></div>
    </div>

    <div id="lapor-tugas-page" class="container mt-4 mb-5 hidden">
        <div class="d-flex align-items-center mb-4">
            <button onclick="bukaHalaman('dashboard-page')" class="btn btn-light shadow-sm me-3"><i class="bi bi-arrow-left"></i></button>
            <h4 class="fw-bold m-0">Lapor Kegiatan</h4>
        </div>
        <div class="card border-0 shadow-sm p-4 mb-4" style="border-radius: 15px;">
            <form id="formTugas">
                <div class="form-section-title mt-0">Data Dasar</div>
                <div class="mb-3"><label class="small fw-bold">Wilayah (Desa Binaan)</label><select id="tg-desa" class="form-select" required></select></div>
                <div class="mb-3"><label class="small fw-bold">Lokasi Kegiatan</label><input type="text" id="tg-lokasi" class="form-control"></div>
                <div class="mb-3"><label class="small fw-bold">Tanggal Kegiatan</label><input type="date" id="tg-tanggal" class="form-control"></div>
                <div class="row">
                    <div class="col-6 mb-3"><label class="small fw-bold">Waktu Mulai</label><input type="time" id="tg-mulai" class="form-control"></div>
                    <div class="col-6 mb-3"><label class="small fw-bold">Waktu Selesai</label><input type="time" id="tg-selesai" class="form-control"></div>
                </div>

                <div class="form-section-title">Detail Kegiatan</div>
                <div class="mb-3"><label class="small fw-bold">Peserta Kegiatan</label><input type="text" id="tg-peserta" class="form-control" placeholder="Cth: Kader, PUS, Tokoh"></div>
                <div class="mb-3"><label class="small fw-bold">Jumlah Peserta Hadir</label><input type="number" id="tg-jml" class="form-control"></div>
                <div class="mb-3"><label class="small fw-bold">Judul Kegiatan</label><input type="text" id="tg-judul" class="form-control"></div>
                <div class="mb-3"><label class="small fw-bold">Topik Kegiatan</label>
                    <select id="tg-topik" class="form-select" onchange="aturJenis()" required>
                        <option value="">-- Pilih Topik --</option>
                        <option value="KIE">KIE</option>
                        <option value="PELAYANAN DAN PENGGERAKAN">PELAYANAN DAN PENGGERAKAN</option>
                        <option value="PENCATATAN DAN PELAPORAN">PENCATATAN DAN PELAPORAN</option>
                        <option value="PERTEMUAN">PERTEMUAN</option>
                        <option value="LAINNYA">LAINNYA</option>
                    </select>
                </div>
                <div id="box-jenis" class="mb-3 hidden">
                    <label class="small fw-bold text-primary">Jenis Kegiatan</label>
                    <select id="tg-jenis" class="form-select" onchange="aturTableKB()"></select>
                    <input type="text" id="tg-jenis-lain" class="form-control mt-2 hidden" placeholder="Tulis jenis kegiatan...">
                </div>

                <div id="box-tabel-kb" class="mb-3 hidden">
                    <label class="small fw-bold text-danger">Jumlah Akseptor Yang Dilayani</label>
                    <table class="table table-bordered table-sm text-center align-middle small">
                        <thead class="table-light"><tr><th>Alokon</th><th>Baru</th><th>Ulang</th><th>Ganti</th></tr></thead>
                        <tbody>
                            <tr><td class="fw-bold">IUD</td><td><input type="number" id="kb-iud-b" class="form-control form-control-sm"></td><td><input type="number" id="kb-iud-u" class="form-control form-control-sm"></td><td><input type="number" id="kb-iud-g" class="form-control form-control-sm"></td></tr>
                            <tr><td class="fw-bold">IMPLAN</td><td><input type="number" id="kb-imp-b" class="form-control form-control-sm"></td><td><input type="number" id="kb-imp-u" class="form-control form-control-sm"></td><td><input type="number" id="kb-imp-g" class="form-control form-control-sm"></td></tr>
                            <tr><td class="fw-bold">MOW</td><td><input type="number" id="kb-mow-b" class="form-control form-control-sm"></td><td><input type="number" id="kb-mow-u" class="form-control form-control-sm"></td><td><input type="number" id="kb-mow-g" class="form-control form-control-sm"></td></tr>
                            <tr><td class="fw-bold">MOP</td><td><input type="number" id="kb-mop-b" class="form-control form-control-sm"></td><td><input type="number" id="kb-mop-u" class="form-control form-control-sm"></td><td><input type="number" id="kb-mop-g" class="form-control form-control-sm"></td></tr>
                        </tbody>
                    </table>
                </div>

                <div class="mb-3"><label class="small fw-bold">Deskripsi / Keterangan Kegiatan</label><textarea id="tg-deskripsi" class="form-control" rows="3"></textarea></div>

                <div class="form-section-title">Lampiran Dokumentasi</div>
                <div class="mb-3"><label class="small fw-bold">Lampiran Foto Dokumentasi</label><input type="file" id="tg-foto" class="form-control" accept="image/*"></div>
                <div class="mb-4"><label class="small fw-bold">Lampiran Dokumen (PDF/Word/Excel)</label><input type="file" id="tg-dokumen" class="form-control" accept=".pdf,.doc,.docx,.xls,.xlsx"></div>

                <button type="button" onclick="kirimLaporan()" id="btnKirimTugas" class="btn btn-success w-100 py-3 fw-bold rounded-4 shadow">SIMPAN KEGIATAN</button>
            </form>
        </div>

        <h5 class="fw-bold mt-5 mb-3"><i class="bi bi-card-list"></i> DAFTAR KEGIATAN</h5>
        <div id="list-kegiatan"></div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbywBC5dWIESA2CcDoNQncWXfAze7fyvgFxhalt3oXcO7WUH7je9Lfx_fM3VutRn4OY-gw/exec";

        const opsiJenis = {
            "KIE": ["Individu", "Kelompok", "Sosialisasi", "Penyuluhan"],
            "PELAYANAN DAN PENGGERAKAN": ["Pendampingan", "Fasilitasi", "Advokasi", "Pendistribusian Alokon", "Pelayanan KB"],
            "PENCATATAN DAN PELAPORAN": ["Fasilitasi Laporan Faskes", "Pelaporan SIGA"],
            "PERTEMUAN": ["Staff Meeting", "Rapat Koordinasi", "Musrenbang", "Pertemuan Kecamatan", "Pertemuan Kabupaten"]
        };

        function bukaHalaman(id) {
            ['login-page', 'dashboard-page', 'lapor-tugas-page'].forEach(pg => {
                const el = document.getElementById(pg); if(el) el.classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
            window.scrollTo(0,0);
        }

        window.onload = () => {
            const user = localStorage.getItem('userPKB');
            setTimeout(() => {
                document.getElementById('splash-screen').classList.add('hidden');
                user ? tampilkanDashboard(JSON.parse(user)) : bukaHalaman('login-page');
            }, 800);
        };

        async function prosesLogin() {
            const nip = document.getElementById('nip').value;
            const nik = document.getElementById('nik').value;
            const btn = document.getElementById('btnLogin');
            btn.disabled = true; btn.innerText = "Mengecek...";
            const res = await fetch(`${SCRIPT_URL}?action=login&nip=${nip}&nik=${nik}`, { method: 'POST' });
            const d = await res.json();
            if(d.status === "sukses") {
                localStorage.setItem('userPKB', JSON.stringify(d.dataProfil));
                tampilkanDashboard(d.dataProfil);
            } else { alert("Gagal Login"); btn.disabled = false; btn.innerText = "MASUK"; }
        }

        function tampilkanDashboard(d) {
            bukaHalaman('dashboard-page');
            document.getElementById('view-nama').innerText = d.nama_asli;
            document.getElementById('view-nip').innerText = d.nip;
            document.getElementById('view-kec').innerText = d.wilayah_binaan_kecamatan + " / " + d.wilayah_binaan_desa;
            if(d.foto && d.foto !== "-") document.getElementById('view-foto').src = d.foto;
            
            const grid = document.getElementById('menu-grid');
            const menus = [['bi-journal-check', '#0d6efd', 'Lapor Tugas', 'siapkanLaporTugas()'], ['bi-person-lines-fill', '#198754', 'Profil', 'alert("Profil")']];
            grid.innerHTML = menus.map(m => `
                <div class="col-6"><div class="card p-3 border-0 shadow-sm menu-card text-center" onclick="${m[3]}"><i class="bi ${m[0]} h2" style="color:${m[1]}"></i><div class="small fw-bold mt-2">${m[2]}</div></div></div>
            `).join('');
        }

        async function siapkanLaporTugas() {
            const user = JSON.parse(localStorage.getItem('userPKB'));
            bukaHalaman('lapor-tugas-page');
            const selDesa = document.getElementById('tg-desa');
            selDesa.innerHTML = '<option value="">Memuat binaan...</option>';
            
            fetch(`${SCRIPT_URL}?action=get_binaan&nip=${user.nip}`).then(res => res.json()).then(d => {
                if(d.status === "sukses") {
                    let h = '<option value="">-- Pilih Desa --</option>';
                    d.binaan.forEach(b => h += `<option value="${b.id}" data-nama="${b.nama}">${b.nama}</option>`);
                    selDesa.innerHTML = h;
                }
            });
            muatRiwayat(user.nip);
        }

        function aturJenis() {
            const topik = document.getElementById('tg-topik').value;
            const box = document.getElementById('box-jenis');
            const sel = document.getElementById('tg-jenis');
            const txtLain = document.getElementById('tg-jenis-lain');
            document.getElementById('box-tabel-kb').classList.add('hidden');
            if(!topik) { box.classList.add('hidden'); return; }
            box.classList.remove('hidden');
            if(topik === "LAINNYA") { sel.classList.add('hidden'); txtLain.classList.remove('hidden'); }
            else {
                sel.classList.remove('hidden'); txtLain.classList.add('hidden');
                let h = '<option value="">-- Pilih Jenis --</option>';
                opsiJenis[topik].forEach(j => h += `<option value="${j}">${j}</option>`);
                sel.innerHTML = h;
            }
        }

        function aturTableKB() {
            document.getElementById('box-tabel-kb').classList.toggle('hidden', document.getElementById('tg-jenis').value !== 'Pelayanan KB');
        }

        function muatRiwayat(nip) {
            const div = document.getElementById('list-kegiatan');
            div.innerHTML = '<div class="text-center small py-3">Memuat riwayat...</div>';
            fetch(`${SCRIPT_URL}?action=get_kegiatan&nip=${nip}`).then(res => res.json()).then(d => {
                if(d.status === "sukses") {
                    div.innerHTML = d.data.map(k => `
                        <div class="card border-0 shadow-sm p-3 mb-3" style="border-left: 4px solid var(--primary-color);">
                            <div class="fw-bold small text-primary">${k.topik}</div>
                            <div class="fw-bold">${k.judul}</div>
                            <div class="small text-muted">${k.desa} | ${k.waktu.split('T')[0]}</div>
                            ${k.url_notulen !== "-" ? `<a href="${k.url_notulen}" target="_blank" class="btn btn-sm btn-outline-success mt-2">Buka Notulen</a>` : ""}
                        </div>
                    `).join('');
                } else { div.innerHTML = "Belum ada riwayat."; }
            });
        }

        const readF = (file) => new Promise(res => { if(!file) return res(null); const r = new FileReader(); r.onload = (e) => res({ n: file.name, m: file.type, d: e.target.result.split(',')[1] }); r.readAsDataURL(file); });

        async function kirimLaporan() {
            const user = JSON.parse(localStorage.getItem('userPKB'));
            const btn = document.getElementById('btnKirimTugas');
            const dSel = document.getElementById('tg-desa');
            if(!dSel.value || !document.getElementById('tg-judul').value) return alert("Pilih Desa & Judul!");

            btn.disabled = true; btn.innerText = "Mengirim...";
            
            let dataKb = "-";
            if(document.getElementById('tg-jenis').value === 'Pelayanan KB') {
                const gV = (id) => document.getElementById(id).value || "0";
                dataKb = `IUD(B:${gV('kb-iud-b')},U:${gV('kb-iud-u')},G:${gV('kb-iud-g')}); IMP(B:${gV('kb-imp-b')},U:${gV('kb-imp-u')},G:${gV('kb-imp-g')}); MOW(B:${gV('kb-mow-b')},U:${gV('kb-mow-u')},G:${gV('kb-mow-g')}); MOP(B:${gV('kb-mop-b')},U:${gV('kb-mop-u')},G:${gV('kb-mop-g')})`;
            }

            const topik = document.getElementById('tg-topik').value;
            const jenis = (topik === "LAINNYA") ? document.getElementById('tg-jenis-lain').value : document.getElementById('tg-jenis').value;
            const foto = await readF(document.getElementById('tg-foto').files[0]);
            const dok = await readF(document.getElementById('tg-dokumen').files[0]);

            const p = new URLSearchParams();
            p.append('action', 'lapor_tugas'); p.append('nip', user.nip); p.append('nama_pkb', user.nama_asli);
            p.append('id_desa', dSel.value); p.append('nama_desa', dSel.options[dSel.selectedIndex].getAttribute('data-nama'));
            p.append('lokasi', document.getElementById('tg-lokasi').value || "-"); p.append('tanggal', document.getElementById('tg-tanggal').value);
            p.append('waktu_mulai', document.getElementById('tg-mulai').value); p.append('waktu_selesai', document.getElementById('tg-selesai').value);
            p.append('peserta', document.getElementById('tg-peserta').value); p.append('jml_hadir', document.getElementById('tg-jml').value);
            p.append('judul', document.getElementById('tg-judul').value); p.append('topik', topik); p.append('jenis', jenis);
            p.append('deskripsi', document.getElementById('tg-deskripsi').value); p.append('data_kb', dataKb);
            if(foto) { p.append('fotoName', foto.n); p.append('fotoMime', foto.m); p.append('fotoData', foto.d); }
            if(dok) { p.append('dokName', dok.n); p.append('dokMime', dok.m); p.append('dokData', dok.d); }

            const r = await fetch(SCRIPT_URL, { method: 'POST', body: p });
            const res = await r.json();
            if(res.status === "sukses") {
                if(topik === "PERTEMUAN" && confirm("Kegiatan Disimpan! Buat NOTULEN otomatis?")) {
                    btn.innerText = "Membuat Notulen...";
                    p.set('action', 'buat_notulen'); p.append('row_index', res.row_index);
                    await fetch(SCRIPT_URL, { method: 'POST', body: p });
                }
                alert("Berhasil!"); document.getElementById('formTugas').reset(); siapkanLaporTugas();
            } else { alert("Gagal"); }
            btn.disabled = false; btn.innerText = "SIMPAN KEGIATAN";
        }

        function logout() { localStorage.removeItem('userPKB'); location.reload(); }
    </script>
</body>
</html>
