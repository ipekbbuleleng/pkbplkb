<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Informasi PKB/PLKB Buleleng</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --primary-color: #007bff; }
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        #splash-logo { width: 150px; }
        .hidden { display: none !important; }
        .card-profile { border-radius: 15px; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.08); overflow: hidden; }
        .profile-img { width: 110px; height: 110px; border-radius: 50%; object-fit: cover; border: 4px solid white; background: white; }
        .header-bg { background: linear-gradient(135deg, var(--primary-color), #0056b3); height: 100px; }
        .menu-card { transition: transform 0.2s; cursor: pointer; border-radius: 12px; }
        .info-row { border-bottom: 1px dashed #dee2e6; padding: 10px 0; }
        .info-label { font-size: 0.8rem; color: #6c757d; display: block; }
        .info-value { font-size: 0.95rem; font-weight: 500; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img id="splash-logo" src="IPeKB26-PWA.png">
        <div class="spinner-border text-primary mt-3"></div>
    </div>

    <div id="login-page" class="container mt-5 hidden">
        <div class="row justify-content-center text-center">
            <div class="col-md-5">
                <img src="IPeKB26-PWA.png" style="width: 80px;">
                <h2 class="fw-bold mt-2">Login PKB/PLKB</h2>
                <div class="card p-4 mt-4 shadow-sm border-0 text-start">
                    <div class="mb-3">
                        <label class="form-label fw-bold">NIP</label>
                        <input type="text" id="nip" class="form-control">
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">Password (NIK)</label>
                        <input type="password" id="nik" class="form-control">
                    </div>
                    <button onclick="prosesLogin()" id="btnLogin" class="btn btn-primary w-100 fw-bold">MASUK</button>
                    <p id="loginError" class="text-danger mt-3 small hidden text-center">NIP atau NIK salah!</p>
                </div>
            </div>
        </div>
    </div>

    <div id="dashboard-page" class="container mt-4 mb-5 hidden">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="fw-bold m-0">Beranda</h4>
            <button onclick="logout()" class="btn btn-sm btn-outline-danger fw-bold">Keluar</button>
        </div>

        <div class="card card-profile mb-3">
            <div class="header-bg"></div>
            <div class="text-center" style="margin-top: -55px;">
                <div class="position-relative d-inline-block">
                    <img id="view-foto" src="https://via.placeholder.com/150" class="profile-img shadow-sm">
                    <button onclick="alert('Gunakan Form Edit Profil untuk ubah URL Foto')" class="btn btn-light rounded-circle shadow position-absolute bottom-0 end-0 border" style="padding: 5px 9px;"><i class="bi bi-camera-fill text-primary"></i></button>
                </div>
                <h5 id="view-nama" class="mt-2 fw-bold text-dark">-</h5>
                <span id="view-role" class="badge bg-warning text-dark px-3 mb-2">-</span>
            </div>
            <div class="card-body bg-light">
                <div class="d-flex justify-content-between small border-bottom pb-2"><span>NIP</span><span id="view-nip" class="fw-bold">-</span></div>
                <div class="d-flex justify-content-between small pt-2"><span>Kecamatan</span><span id="view-kec" class="fw-bold">-</span></div>
            </div>
        </div>

        <div class="card mb-4 border-0 shadow-sm bg-warning-subtle">
            <div class="card-body py-2">
                <marquee id="pengumuman-text" class="small fw-medium">Selamat datang di E-PKB Buleleng.</marquee>
            </div>
        </div>

        <div class="row g-3 text-center" id="menu-grid"></div>
    </div>

    <div id="detail-profil-page" class="container mt-4 mb-5 hidden">
        <div class="d-flex align-items-center mb-4">
            <button onclick="bukaHalaman('dashboard-page')" class="btn btn-light me-3"><i class="bi bi-arrow-left"></i></button>
            <h4 class="fw-bold m-0">Detail Profil</h4>
        </div>
        <div class="card border-0 shadow-sm p-4 mb-4" id="detail-content" style="border-radius: 15px;"></div>
        <button onclick="siapkanEditProfil()" class="btn btn-primary w-100 py-3 fw-bold rounded-4 shadow-sm"><i class="bi bi-pencil-square me-2"></i> EDIT PROFIL</button>
    </div>

    <div id="edit-profil-page" class="container mt-4 mb-5 hidden">
        <div class="d-flex align-items-center mb-4">
            <button onclick="bukaHalaman('detail-profil-page')" class="btn btn-light me-3"><i class="bi bi-arrow-left"></i></button>
            <h4 class="fw-bold m-0">Edit Profil</h4>
        </div>
        <div class="card border-0 shadow-sm p-4" style="border-radius: 15px;">
            <form id="formEdit">
                <input type="hidden" id="edit-id-nip">
                <div class="mb-3"><label class="form-label small fw-bold">Gelar Depan</label><input type="text" id="edit-g-depan" class="form-control"></div>
                <div class="mb-3"><label class="form-label small fw-bold">Gelar Belakang</label><input type="text" id="edit-g-belakang" class="form-control"></div>
                <div class="mb-3"><label class="form-label small fw-bold">Jenis Kelamin</label><select id="edit-jk" class="form-control"><option value="Laki-laki">Laki-laki</option><option value="Perempuan">Perempuan</option></select></div>
                <div class="mb-3"><label class="form-label small fw-bold">Status ASN</label><input type="text" id="edit-status" class="form-control"></div>
                <div class="mb-3"><label class="form-label small fw-bold">Jabatan</label><input type="text" id="edit-jabatan" class="form-control"></div>
                <div class="mb-3"><label class="form-label small fw-bold">Golongan</label><input type="text" id="edit-gol" class="form-control"></div>
                <div class="mb-3"><label class="form-label small fw-bold">Tempat Lahir</label><input type="text" id="edit-t-lahir" class="form-control"></div>
                <div class="mb-3"><label class="form-label small fw-bold">Tanggal Lahir</label><input type="text" id="edit-tgl-lahir" class="form-control" placeholder="DD-MM-YYYY"></div>
                <div class="mb-3"><label class="form-label small fw-bold">Alamat Asal</label><textarea id="edit-almt-asal" class="form-control"></textarea></div>
                <div class="mb-3"><label class="form-label small fw-bold">Alamat Domisili</label><textarea id="edit-almt-dom" class="form-control"></textarea></div>
                <div class="mb-3"><label class="form-label small fw-bold">Kecamatan Binaan</label><input type="text" id="edit-kec" class="form-control"></div>
                <div class="mb-3"><label class="form-label small fw-bold">Desa Binaan</label><input type="text" id="edit-desa" class="form-control"></div>
                <div class="mb-3"><label class="form-label small fw-bold">No. HP</label><input type="text" id="edit-hp" class="form-control"></div>
                <div class="mb-3"><label class="form-label small fw-bold">Email</label><input type="email" id="edit-email" class="form-control"></div>
                <div class="mb-4"><label class="form-label small fw-bold">URL Foto Profil</label><input type="text" id="edit-foto" class="form-control"></div>
                <button type="button" onclick="simpanProfil()" id="btnSimpan" class="btn btn-success w-100 py-3 fw-bold rounded-4">SIMPAN PERUBAHAN</button>
            </form>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbywBC5dWIESA2CcDoNQncWXfAze7fyvgFxhalt3oXcO7WUH7je9Lfx_fM3VutRn4OY-gw/exec";

        function bukaHalaman(id) {
            ['login-page', 'dashboard-page', 'detail-profil-page', 'edit-profil-page'].forEach(pg => document.getElementById(pg).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            window.scrollTo(0,0);
        }

        window.onload = () => {
            const user = localStorage.getItem('userPKB');
            setTimeout(() => {
                document.getElementById('splash-screen').classList.add('hidden');
                user ? tampilkanProfil(JSON.parse(user)) : bukaHalaman('login-page');
            }, 800);
        };

        async function prosesLogin() {
            const nip = document.getElementById('nip').value;
            const nik = document.getElementById('nik').value;
            const btn = document.getElementById('btnLogin');
            if(!nip || !nik) return alert("Isi NIP & NIK");
            btn.disabled = true; btn.innerText = "Mengecek...";
            try {
                const res = await fetch(`${SCRIPT_URL}?action=login&nip=${nip}&nik=${nik}`, { method: 'POST' });
                const d = await res.json();
                if(d.status === "sukses") {
                    localStorage.setItem('userPKB', JSON.stringify(d.dataProfil));
                    tampilkanProfil(d.dataProfil);
                } else { alert("Login Gagal!"); }
            } catch(e) { alert("Error Server"); } finally { btn.disabled = false; btn.innerText = "MASUK"; }
        }

        function tampilkanProfil(d) {
            bukaHalaman('dashboard-page');
            const namaLengkap = (d.gelar_depan ? d.gelar_depan + " " : "") + d.nama_asli + (d.gelar_belakang ? ", " + d.gelar_belakang : "");
            document.getElementById('view-nama').innerText = namaLengkap;
            document.getElementById('view-role').innerText = d.role;
            document.getElementById('view-nip').innerText = d.nip;
            document.getElementById('view-kec').innerText = d.wilayah_binaan_kecamatan;
            if(d.foto) document.getElementById('view-foto').src = d.foto;

            let html = `<h6 class="fw-bold text-primary border-bottom pb-2">DATA PEGAWAI</h6>`;
            const fields = [
                ["NIP", d.nip], ["Status", d.status_asn], ["Jabatan", d.jabatan], ["Golongan", d.golongan],
                ["JK", d.jenis_kelamin], ["TTL", d.tempat_lahir + ", " + d.tanggal_lahir],
                ["Alamat Asal", d.alamat_asal], ["Domisili", d.alamat_domisili],
                ["Kecamatan", d.wilayah_binaan_kecamatan], ["Desa", d.wilayah_binaan_desa],
                ["HP", d.no_hp], ["Email", d.email]
            ];
            fields.forEach(f => html += `<div class="info-row"><span class="info-label">${f[0]}</span><span class="info-value">${f[1]}</span></div>`);
            document.getElementById('detail-content').innerHTML = html;
            renderMenu(d.role);
        }

        function renderMenu(role) {
            const grid = document.getElementById('menu-grid');
            const menus = [
                ['bi-megaphone-fill', '#0dcaf0', 'Informasi', 'alert("Info")'],
                ['bi-person-lines-fill', '#198754', 'Detail Profil', 'bukaHalaman("detail-profil-page")']
            ];
            if(role === "PKB") {
                menus.push(['bi-journal-check', '#0d6efd', 'Laporan', 'alert("Tugas")'], ['bi-file-earmark-text', '#6f42c1', 'Admin', 'alert("Admin")']);
            }
            grid.innerHTML = menus.map(m => `
                <div class="col-6 mb-2"><div class="card p-3 border-0 shadow-sm menu-card h-100" onclick='${m[3]}'>
                <i class="bi ${m[0]} h2 mb-2" style="color:${m[1]}"></i><div class="small fw-bold">${m[2]}</div></div></div>
            `).join('');
        }

        function siapkanEditProfil() {
            const d = JSON.parse(localStorage.getItem('userPKB'));
            document.getElementById('edit-id-nip').value = d.nip;
            document.getElementById('edit-g-depan').value = d.gelar_depan;
            document.getElementById('edit-g-belakang').value = d.gelar_belakang;
            document.getElementById('edit-jk').value = d.jenis_kelamin;
            document.getElementById('edit-status').value = d.status_asn;
            document.getElementById('edit-jabatan').value = d.jabatan;
            document.getElementById('edit-gol').value = d.golongan;
            document.getElementById('edit-t-lahir').value = d.tempat_lahir;
            document.getElementById('edit-tgl-lahir').value = d.tanggal_lahir;
            document.getElementById('edit-almt-asal').value = d.alamat_asal;
            document.getElementById('edit-almt-dom').value = d.alamat_domisili;
            document.getElementById('edit-kec').value = d.wilayah_binaan_kecamatan;
            document.getElementById('edit-desa').value = d.wilayah_binaan_desa;
            document.getElementById('edit-hp').value = d.no_hp;
            document.getElementById('edit-email').value = d.email;
            document.getElementById('edit-foto').value = d.foto;
            bukaHalaman('edit-profil-page');
        }

        async function simpanProfil() {
            const btn = document.getElementById('btnSimpan');
            btn.disabled = true; btn.innerText = "Menyimpan...";
            
            const p = new URLSearchParams();
            p.append('action', 'update_profil');
            p.append('id_nip', document.getElementById('edit-id-nip').value);
            p.append('g_depan', document.getElementById('edit-g-depan').value);
            p.append('g_belakang', document.getElementById('edit-g-belakang').value);
            p.append('jk', document.getElementById('edit-jk').value);
            p.append('status', document.getElementById('edit-status').value);
            p.append('jabatan', document.getElementById('edit-jabatan').value);
            p.append('gol', document.getElementById('edit-gol').value);
            p.append('t_lahir', document.getElementById('edit-t-lahir').value);
            p.append('tgl_lahir', document.getElementById('edit-tgl-lahir').value);
            p.append('almt_asal', document.getElementById('edit-almt-asal').value);
            p.append('almt_dom', document.getElementById('edit-almt-dom').value);
            p.append('kec', document.getElementById('edit-kec').value);
            p.append('desa', document.getElementById('edit-desa').value);
            p.append('hp', document.getElementById('edit-hp').value);
            p.append('email', document.getElementById('edit-email').value);
            p.append('foto', document.getElementById('edit-foto').value);

            try {
                const res = await fetch(SCRIPT_URL, { method: 'POST', body: p });
                const d = await res.json();
                if(d.status === "sukses") {
                    alert("Data Berhasil Diperbarui! Silakan Login Ulang untuk memuat data terbaru.");
                    logout();
                }
            } catch(e) { alert("Gagal Simpan"); } finally { btn.disabled = false; btn.innerText = "SIMPAN PERUBAHAN"; }
        }

        function logout() { localStorage.removeItem('userPKB'); location.reload(); }
    </script>
</body>
</html>
