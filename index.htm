<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-PKB Buleleng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --primary-color: #007bff; }
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .hidden { display: none !important; }
        .card-profile { border-radius: 15px; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.08); overflow: hidden; }
        .profile-img { width: 110px; height: 110px; border-radius: 50%; object-fit: cover; border: 4px solid white; background: white; }
        .header-bg { background: linear-gradient(135deg, var(--primary-color), #0056b3); height: 100px; }
        .info-row { border-bottom: 1px dashed #dee2e6; padding: 8px 0; }
        .info-label { font-size: 0.75rem; color: #6c757d; display: block; }
        .info-value { font-size: 0.9rem; font-weight: 500; }
        .form-section-title { font-size: 0.85rem; font-weight: bold; color: var(--primary-color); margin: 20px 0 10px; padding-bottom: 5px; border-bottom: 2px solid #e9ecef; }
        .desa-checkbox-list { max-height: 180px; overflow-y: auto; border: 1px solid #dee2e6; border-radius: 5px; padding: 10px; background: #fff; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="IPeKB26-PWA.png" style="width:150px;">
        <div class="spinner-border text-primary mt-3"></div>
    </div>

    <div id="login-page" class="container mt-5 hidden text-center">
        <img src="IPeKB26-PWA.png" style="width: 80px;">
        <div class="card p-4 mt-4 shadow-sm border-0 text-start mx-auto" style="max-width: 400px; border-radius: 15px;">
            <h4 class="fw-bold text-center">Login PKB</h4>
            <div class="mb-3"><label class="small fw-bold">NIP</label><input type="text" id="nip" class="form-control"></div>
            <div class="mb-4"><label class="small fw-bold">NIK (Password)</label><input type="password" id="nik" class="form-control"></div>
            <button onclick="prosesLogin()" id="btnLogin" class="btn btn-primary w-100 fw-bold">MASUK</button>
        </div>
    </div>

    <div id="dashboard-page" class="container mt-4 mb-5 hidden">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="fw-bold m-0">Beranda</h4>
            <button onclick="logout()" class="btn btn-sm btn-outline-danger">Keluar</button>
        </div>
        <div class="card card-profile mb-4">
            <div class="header-bg"></div>
            <div class="text-center" style="margin-top: -55px;">
                <img id="view-foto" src="https://via.placeholder.com/150" class="profile-img shadow-sm">
                <h5 id="view-nama" class="mt-2 fw-bold">-</h5>
                <span id="view-role" class="badge bg-warning text-dark px-3 mb-3">-</span>
            </div>
            <div class="card-body bg-light">
                <div class="d-flex justify-content-between small border-bottom pb-2"><span>NIP</span><span id="view-nip" class="fw-bold">-</span></div>
                <div class="d-flex justify-content-between small pt-2"><span>Wilayah Binaan</span><span id="view-kec" class="fw-bold">-</span></div>
            </div>
        </div>
        <div class="row g-3 text-center" id="menu-grid"></div>
    </div>

    <div id="detail-profil-page" class="container mt-4 mb-5 hidden">
        <div class="d-flex align-items-center mb-4">
            <button onclick="bukaHalaman('dashboard-page')" class="btn btn-light me-3"><i class="bi bi-arrow-left"></i></button>
            <h4 class="fw-bold m-0">Detail Profil</h4>
        </div>
        <div class="card border-0 shadow-sm p-4 mb-4" id="detail-content" style="border-radius: 15px;"></div>
        <button onclick="siapkanEditProfil()" class="btn btn-primary w-100 py-3 fw-bold rounded-4"><i class="bi bi-pencil-square"></i> EDIT PROFIL</button>
    </div>

    <div id="edit-profil-page" class="container mt-4 mb-5 hidden">
        <div class="d-flex align-items-center mb-3">
            <button onclick="bukaHalaman('detail-profil-page')" class="btn btn-light me-3"><i class="bi bi-arrow-left"></i></button>
            <h4 class="fw-bold m-0">Ubah Data</h4>
        </div>
        <div class="card border-0 shadow-sm p-4" style="border-radius: 15px;">
            <form id="formEdit">
                <input type="hidden" id="edit-id-nip">
                <input type="hidden" id="edit-foto-url">

                <div class="form-section-title">Data Dasar</div>
                <div class="mb-3"><label class="small fw-bold">Nama (Tanpa Gelar)</label><input type="text" id="edit-nama" class="form-control"></div>
                <div class="row">
                    <div class="col-6 mb-3"><label class="small fw-bold">Gelar Depan</label><input type="text" id="edit-g-depan" class="form-control"></div>
                    <div class="col-6 mb-3"><label class="small fw-bold">Gelar Belakang</label><input type="text" id="edit-g-belakang" class="form-control"></div>
                </div>
                <div class="mb-3"><label class="small fw-bold">Agama</label>
                    <select id="edit-agama" class="form-select">
                        <option value="ISLAM">ISLAM</option><option value="HINDU">HINDU</option><option value="KRISTEN">KRISTEN</option><option value="PROTESTAN">PROTESTAN</option><option value="BUDHA">BUDHA</option>
                    </select>
                </div>

                <div class="form-section-title">Keluarga & KB</div>
                <div class="mb-3"><label class="small fw-bold">Status Perkawinan</label>
                    <select id="edit-kawin" class="form-select" onchange="logicKawin()">
                        <option value="BELUM KAWIN">BELUM KAWIN</option><option value="KAWIN">KAWIN</option><option value="JANDA">JANDA</option><option value="DUDA">DUDA</option>
                    </select>
                </div>
                <div id="box-anak" class="mb-3 hidden"><label class="small fw-bold">Jumlah Anak</label><input type="number" id="edit-anak" class="form-control"></div>
                <div id="box-kb" class="mb-3 hidden"><label class="small fw-bold">Peserta KB</label>
                    <select id="edit-kb" class="form-select">
                        <option value="TIDAK BER KB">TIDAK BER KB</option><option value="SUNTIK">SUNTIK</option><option value="PIL">PIL</option><option value="KONDOM">KONDOM</option><option value="IUD">IUD</option><option value="IMPLAN">IMPLAN</option><option value="MOP">MOP</option><option value="MOW">MOW</option>
                    </select>
                </div>

                <div class="form-section-title">Pendidikan</div>
                <div class="mb-3"><label class="small fw-bold">Pendidikan Terakhir</label>
                    <select id="edit-pendidikan" class="form-select">
                        <option value="SMA">SMA</option><option value="D1">D1</option><option value="D2">D2</option><option value="D3">D3</option><option value="D4">D4</option><option value="S1">S1</option><option value="S2">S2</option><option value="S3">S3</option>
                    </select>
                </div>
                <div class="mb-3"><label class="small fw-bold">Jurusan</label><input type="text" id="edit-jurusan" class="form-control"></div>

                <div class="form-section-title">Riwayat SK</div>
                <div class="mb-3"><label class="small fw-bold">TMT SK Pengangkatan Pertama</label><input type="date" id="edit-tmt-awal" class="form-control"></div>
                <div class="mb-3"><label class="small fw-bold">TMT SK Jabatan Terakhir</label><input type="date" id="edit-tmt-jab" class="form-control"></div>

                <div class="form-section-title">Data Lainnya (NIP/Alamat Tetap)</div>
                <p class="small text-muted text-center">Data wilayah binaan dan alamat silakan disesuaikan jika ada perubahan.</p>

                <button type="button" onclick="simpanProfil()" id="btnSimpan" class="btn btn-success w-100 py-3 fw-bold mt-3">SIMPAN PERUBAHAN</button>
            </form>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbywBC5dWIESA2CcDoNQncWXfAze7fyvgFxhalt3oXcO7WUH7je9Lfx_fM3VutRn4OY-gw/exec";

        function bukaHalaman(id) {
            ['login-page', 'dashboard-page', 'detail-profil-page', 'edit-profil-page'].forEach(pg => document.getElementById(pg).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function logicKawin() {
            const st = document.getElementById('edit-kawin').value;
            document.getElementById('box-anak').classList.toggle('hidden', st === 'BELUM KAWIN');
            document.getElementById('box-kb').classList.toggle('hidden', st !== 'KAWIN');
        }

        window.onload = () => {
            const user = localStorage.getItem('userPKB');
            setTimeout(() => {
                document.getElementById('splash-screen').classList.add('hidden');
                user ? tampilkanProfil(JSON.parse(user)) : bukaHalaman('login-page');
            }, 800);
        };

        async function prosesLogin() {
            const nip = document.getElementById('nip').value;
            const nik = document.getElementById('nik').value;
            if(!nip || !nik) return;
            const res = await fetch(`${SCRIPT_URL}?action=login&nip=${nip}&nik=${nik}`, { method: 'POST' });
            const d = await res.json();
            if(d.status === "sukses") {
                localStorage.setItem('userPKB', JSON.stringify(d.dataProfil));
                tampilkanProfil(d.dataProfil);
            } else { alert("Login Gagal"); }
        }

        function tampilkanProfil(d) {
            bukaHalaman('dashboard-page');
            document.getElementById('view-nama').innerText = (d.gelar_depan != "-" ? d.gelar_depan + " " : "") + d.nama_asli + (d.gelar_belakang != "-" ? ", " + d.gelar_belakang : "");
            document.getElementById('view-nip').innerText = d.nip;
            document.getElementById('view-kec').innerText = d.wilayah_binaan_kecamatan + " / " + d.wilayah_binaan_desa;
            if(d.foto && d.foto != "-") document.getElementById('view-foto').src = d.foto;

            let html = `<h6 class="fw-bold text-primary border-bottom pb-2">DATA PEGAWAI</h6>`;
            const f = [
                ["NIP", d.nip], ["Agama", d.agama], ["Status Kawin", d.status_kawin], ["Jml Anak", d.jml_anak], ["Peserta KB", d.peserta_kb],
                ["Pendidikan", d.pendidikan], ["Jurusan", d.jurusan], ["TMT Pertama", d.tmt_awal], ["TMT Jabatan", d.tmt_jabatan],
                ["Jabatan", d.jabatan], ["Alamat", d.alamat_domisili]
            ];
            f.forEach(x => html += `<div class="info-row"><span class="info-label">${x[0]}</span><span class="info-value">${x[1]}</span></div>`);
            document.getElementById('detail-content').innerHTML = html;
            renderMenu(d.role);
        }

        function renderMenu(role) {
            const grid = document.getElementById('menu-grid');
            grid.innerHTML = `
                <div class="col-6"><div class="card p-3 border-0 shadow-sm" onclick="bukaHalaman('detail-profil-page')"><i class="bi bi-person-lines-fill h2 text-success"></i><div class="small fw-bold">Profil</div></div></div>
                <div class="col-6"><div class="card p-3 border-0 shadow-sm"><i class="bi bi-megaphone-fill h2 text-info"></i><div class="small fw-bold">Info</div></div></div>
            `;
        }

        function siapkanEditProfil() {
            const d = JSON.parse(localStorage.getItem('userPKB'));
            document.getElementById('edit-id-nip').value = d.nip;
            document.getElementById('edit-nama').value = d.nama_asli;
            document.getElementById('edit-g-depan').value = d.gelar_depan != "-" ? d.gelar_depan : "";
            document.getElementById('edit-g-belakang').value = d.gelar_belakang != "-" ? d.gelar_belakang : "";
            document.getElementById('edit-agama').value = d.agama != "-" ? d.agama : "HINDU";
            document.getElementById('edit-kawin').value = d.status_kawin != "-" ? d.status_kawin : "BELUM KAWIN";
            document.getElementById('edit-anak').value = d.jml_anak != "-" ? d.jml_anak : 0;
            document.getElementById('edit-kb').value = d.peserta_kb != "-" ? d.peserta_kb : "TIDAK BER KB";
            document.getElementById('edit-pendidikan').value = d.pendidikan != "-" ? d.pendidikan : "S1";
            document.getElementById('edit-jurusan').value = d.jurusan != "-" ? d.jurusan : "";
            document.getElementById('edit-tmt-awal').value = d.tmt_awal != "-" ? d.tmt_awal : "";
            document.getElementById('edit-tmt-jab').value = d.tmt_jabatan != "-" ? d.tmt_jabatan : "";
            document.getElementById('edit-foto-url').value = d.foto;
            logicKawin();
            bukaHalaman('edit-profil-page');
        }

        async function simpanProfil() {
            const btn = document.getElementById('btnSimpan');
            btn.disabled = true; btn.innerText = "Menyimpan...";
            const d = JSON.parse(localStorage.getItem('userPKB'));
            const p = new URLSearchParams();
            p.append('action', 'update_profil');
            p.append('id_nip', document.getElementById('edit-id-nip').value);
            p.append('nama_asli', document.getElementById('edit-nama').value);
            p.append('g_depan', document.getElementById('edit-g-depan').value || "-");
            p.append('g_belakang', document.getElementById('edit-g-belakang').value || "-");
            p.append('agama', document.getElementById('edit-agama').value);
            p.append('status_kawin', document.getElementById('edit-kawin').value);
            p.append('jml_anak', document.getElementById('edit-anak').value);
            p.append('peserta_kb', document.getElementById('edit-kb').value);
            p.append('pendidikan', document.getElementById('edit-pendidikan').value);
            p.append('jurusan', document.getElementById('edit-jurusan').value || "-");
            p.append('tmt_awal', document.getElementById('edit-tmt-awal').value);
            p.append('tmt_jabatan', document.getElementById('edit-tmt-jab').value);
            
            // Sertakan data lama agar tidak hilang saat update baris
            p.append('jk', d.jenis_kelamin); p.append('status', d.status_asn); p.append('jabatan', d.jabatan);
            p.append('gol', d.golongan); p.append('t_lahir', d.tempat_lahir); p.append('tgl_lahir', d.tanggal_lahir);
            p.append('almt_asal', d.alamat_asal); p.append('almt_dom', d.alamat_domisili);
            p.append('kec', d.wilayah_binaan_kecamatan); p.append('desa', d.wilayah_binaan_desa);
            p.append('hp', d.no_hp); p.append('email', d.email); p.append('foto', d.foto);

            await fetch(SCRIPT_URL, { method: 'POST', body: p });
            alert("Berhasil! Silakan Login ulang atau Refresh.");
            location.reload();
        }

        function logout() { localStorage.removeItem('userPKB'); location.reload(); }
    </script>
</body>
</html>
